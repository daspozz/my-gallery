[build]
  # Inject environment variables into index.html at build time
  command = "sed -i \"s|__SUPABASE_URL__|$SUPABASE_URL|g; s|__ANON_KEY__|$ANON_KEY|g\" hermes-gallery/index.html"
  publish = "hermes-gallery"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"