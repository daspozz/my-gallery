[build]
  # Install function dependencies, then inject env vars into index.html
  command = "cd netlify/functions && npm install && cd ../.. && sed -i \"s|__SUPABASE_URL__|$SUPABASE_URL|g; s|__ANON_KEY__|$ANON_KEY|g\" index.html"
  publish = "."

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"