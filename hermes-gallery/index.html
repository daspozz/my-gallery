<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bulma CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    .gallery { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
    .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; position: relative; }
    .card img { width: 100%; height: auto; display: block; }
    .card .info { padding: .5rem; position: absolute; bottom: .5rem; left: .5rem; right: .5rem; background: rgba(255,255,255,.8); }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); align-items:center; justify-content:center; }
    .modal.active { display:flex; }
    .modal-content { background:#fff; padding:1rem; max-width:90%; width:90%; }
  </style>
</head>
<body>

<header class="hero is-danger">
  <div class="hero-body">
    <h1 class="title">My Image Gallery</h1>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="gallery" id="gallery">
      <!-- Cards are injected by JS -->
    </div>
  </div>
</section>

<!-- Add modal for creating/editing an item -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2 class="title">Add / Edit Item</h2>
    <form id="item-form">
      <div class="field">
        <label class="label">Image file</label>
        <input type="file" id="file-input" accept="image/*" required>
      </div>
      <div class="field">
        <label class="label">Caption</label>
        <textarea class="textarea" id="caption" rows="3"></textarea>
      </div>
      <div class="field">
        <label class="label">Tags (comma‑separated)</label>
        <input type="text" id="tags" class="input" placeholder="e.g. portrait, sunset">
      </div>
      <div class="field">
        <label class="label">Comment (optional)</label>
        <textarea class="textarea" id="comment" rows="2"></textarea>
      </div>
	  <div class="field">
		<label class="checkbox">
		<input type="checkbox" id="private-toggle">
		Private (only visible to me)
		</label>
		</div>
      <div class="field">
        <button class="button is-primary" type="submit">Save</button>
        <a class="button is-light" href="#" id="close-modal">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  const gallery = document.getElementById('gallery');

    card.className = 'card';

    `;

  });
}

  document.getElementById('modal').classList.add('active');

</body>
</html>
